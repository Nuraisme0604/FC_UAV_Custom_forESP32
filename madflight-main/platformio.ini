;============================================================
; madflight PlatformIO Project Configuration
; Target: ESP32-S3 N16R8 Quadcopter
;============================================================

[platformio]
default_envs = ESP32-S3-N16R8
; src_dir = src  →  PlatformIO compile TẤT CẢ src/**/*.cpp như source files
; (implementation của Rcl, Bar, Gps, Ahr, Out, Pid, v.v.)
; examples/main.cpp được thêm vào qua build_src_filter bên dưới.
src_dir = src

[env]
monitor_speed = 115200
monitor_echo = yes
; chain+ giải quyết transitive deps nhưng KHÔNG scan trong #ifdef blocks
lib_ldf_mode = chain+
; Fix transitive dependency: SD_MMC → FS.h (PlatformIO LDF không auto-resolve)
extra_scripts = pre:extra_script.py
lib_deps =
    SPI
    Wire

;============================================================
; ESP32-S3 N16R8 (16MB Flash QIO, 8MB OPI PSRAM)
;============================================================
[env:ESP32-S3-N16R8]
board = esp32-s3-devkitc-1
platform = espressif32
framework = arduino
monitor_filters = esp32_exception_decoder
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    ; Include path cho <madflight.h> và <madflight_config.h>
    -I src
    -I examples/10.Quadcopter
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.partitions = default_16MB.csv
; Compile TẤT CẢ source (*.c + *.cpp) trong src/ (madflight implementation)
; + examples/10.Quadcopter/main.cpp (quadcopter sketch: setup/loop/imu_loop)
build_src_filter = +<*> +<../examples/10.Quadcopter/main.cpp>
